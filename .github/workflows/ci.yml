name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt
          pip install -e packages/common
          pip install -e packages/mcp_common
          pip install -e packages/agent_core

      - name: Run Ruff (linting)
        run: ruff check .

      - name: Run Ruff (formatting check)
        run: ruff format --check .

      - name: Run MyPy
        run: mypy packages/ apps/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt
          pip install -r requirements/agent_api.txt
          pip install -e packages/common
          pip install -e packages/mcp_common
          pip install -e packages/agent_core

      - name: Run tests
        run: pytest --cov=packages --cov=apps --cov-report=xml -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true
