[project]
name = "agent-core"
version = "0.1.0"
description = "Core agent graph and state management for Invictus AI Copilot"
requires-python = ">=3.11"
dependencies = [
    "langgraph>=0.2.0",
    "langchain>=0.3.0",
    "langchain-openai>=0.2.0",
    "azure-cosmos>=4.7.0",
    "pydantic>=2.9.0",
    "structlog>=24.4.0",
    "httpx>=0.27.0",
    "tavily-python>=0.5.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=5.0.0",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
